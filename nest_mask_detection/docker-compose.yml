version: '3.8'

services:
  # FastAPI inference server
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - NEST_DEVICE_ID=${NEST_DEVICE_ID}
      - GOOGLE_HOME_API_KEY=${GOOGLE_HOME_API_KEY}
      - PUBSUB_TOPIC=${PUBSUB_TOPIC}
      - PUBSUB_SUBSCRIPTION=${PUBSUB_SUBSCRIPTION}
      - DATABASE_URL=postgresql://user:password@db:5432/mask_detection
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
    volumes:
      - ./models:/app/models
      - ./data:/data/mask_detection
      - ./logs:/app/logs
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mask_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Pub/Sub listener (optional)
  consumer:
    build: .
    environment:
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - NEST_DEVICE_ID=${NEST_DEVICE_ID}
      - GOOGLE_HOME_API_KEY=${GOOGLE_HOME_API_KEY}
      - PUBSUB_TOPIC=${PUBSUB_TOPIC}
      - PUBSUB_SUBSCRIPTION=${PUBSUB_SUBSCRIPTION}
      - DATABASE_URL=postgresql://user:password@db:5432/mask_detection
      - DEBUG=false
    volumes:
      - ./models:/app/models
      - ./data:/data/mask_detection
      - ./logs:/app/logs
    depends_on:
      - db
    command: ["python", "consumer.py"]

volumes:
  postgres_data:
